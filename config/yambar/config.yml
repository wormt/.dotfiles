bar:
 monitor: eDP-1
 height: 16
 location: top
 background: ffffffff
 foreground: 000000ff
 font: Monaco:size=12
 #font: mononoki:size=14
 trackpad-sensitivity: 8
 left:
  - river:
     title: {string: {text: " {title}",max: 60}}
     content:
      map:
       on-click:
        left: sh -c "riverctl set-focused-tags $((1 << ({id} - 1)))"
        right: sh -c "riverctl toggle-focused-tags $((1 << ({id} -1)))"
       #middle: sh -c "riverctl toggle-view-tags $((1 << ({id} -1)))"
       conditions:
        ~visible: 
         map:
          conditions:
           ~occupied: {empty: {}}
           occupied: {string: {text: "-{id}-",max: 99}}
        visible: {string: {text: "[{id}]",max: 99,foreground: 000000ff,deco: {background: {color: ec7facff}}}}
 center:
  - mpd:
     host: /tmp/1000/mpd/socket
     content:
      map:
       conditions:
        state != "playing": {empty: {}}
       #state == "playing": {string: {text: "{artist} - {album} - {title}",max: 99}}
        state == "playing":
         map:
          conditions:
           album != "": {string: {text: "{artist} - {album} - {title}",max: 99}}
           album == "": {string: {text: "{artist} - {title}",max: 99}}
 right:
  - script:
     path: ~/.config/yambar/idle
     poll-interval: 250000
     content:
      map:
       on-click:
        left: /bin/sh -c "$HOME/.local/bin/swidle"
       conditions:
        idle: {string: {text: "[💤]",foreground: 000000ff,deco: {background: {color: 70df70ff}}}}
  - alsa:
     #font: SymbolsNerdFontMono-Regular:size=14
     card: pipewire
     mixer: Master
     content:
      map:
       on-click:
        left: /bin/sh -c "$HOME/.config/yambar/open_pavu_control"
       #left: /bin/sh -c "wgv 1%+"
       #right: /bin/sh -c "wgv 1%-"
        middle: /bin/sh -c "amixer -D default:0 sset Master 1+ toggle"
        wheel-up: /bin/sh -c "wgv 1%+"
        wheel-down: /bin/sh -c "wgv 1%-"
       conditions:
        online && ~muted: {string: {text: "[{percent}]",foreground: 000000ff,deco: {background: {color: ec7facff}}}}
        online && muted: {string: {text: "{{percent}}",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}}
        ~online: {string: {text: "{!!}",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}}
  - battery:
     #font: SymbolsNerdFontMono-Regular:size=14
     name: BAT0
     poll-interval: 9999
     content:
      map:
       conditions:
        state == "full": {string: {text: "[yay]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}}
        state == "charging":
         ramp:
          tag: capacity
          items:
           - string: {text: "[{capacity}+]",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}
           - string: {text: "[{capacity}+]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}+]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}+]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
           - string: {text: "[{capacity}+]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
        state == "discharging":
         ramp:
          tag: capacity
          items:
           - string: {text: "[{capacity}-|{estimate}]",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}
           - string: {text: "[{capacity}-|{estimate}]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}-|{estimate}]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}-|{estimate}]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
           - string: {text: "[{capacity}-|{estimate}]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
        state == "not charging":
         ramp:
          tag: capacity
          items:
           - string: {text: "[{capacity}=]",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}
           - string: {text: "[{capacity}=]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}=]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}=]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
          #- string: {text: "[{capacity}=]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
           - string: {text: ""}
        state == "unknown":
         ramp:
          tag: capacity
          items:
           - string: {text: "[{capacity}?]",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}
           - string: {text: "[{capacity}?]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}?]",foreground: 000000ff,deco: {background: {color: ff9c33ff}}}
           - string: {text: "[{capacity}?]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
           - string: {text: "[{capacity}?]",foreground: 000000ff,deco: {background: {color: 80ff80ff}}}
  - network:
     #font: SymbolsNerdFontMono-Regular:size=14
     content:
      map:
       on-click: /bin/sh -c "$HOME/.config/yambar/toggle_wpa_supplicant"
       conditions:
        name == wlan0 && state != "up":
         map:
          default: {string: {text: "[{name}]",foreground: 000000ff,deco: {background: {color: ff4c4cff}}}}
          conditions:
           name == enp0s31f6 && state == "up": {string: {text: "[{name}]",foreground: 000000ff,deco: {background: {color: ffff4dff}}}}
        name == wlan0 && state == "up":
         map:
          default: {string: {text: "[{name}]",foreground: 000000ff,deco: {background: {color: ffff4dff}}}}
          conditions:
           name == enp0s31f6 && state == "up": {string: {text: "[{name}]",foreground: 000000ff,deco: {background: {color: ffff4dff}}}}
  - network:
     #font: SymbolsNerdFontMono-Regular:size=14
     content:
      map:
       conditions:
        (name == airvpn || name == latvia || name == saopaulo || name == tun0) && state == "down": {string: {text: "[{name}]",foreground: 000000ff,deco: {background: {color: d779a6ff}}}}
  - clock:
     #font: SymbolsNerdFontMono-Regular:size=14
     date-format: "%a %d|%I:%M"
     content:
       - string: {text: "[{date}]",foreground: 000000ff,deco: {background: {color: 66b5ffff}}}
